<div class="list-component">

    <ng-container *ngFor="let tag of tagList; let i = index">
        <d-tag [mode]="'checkable'" [(checked)]="tag.checked" [tag]="tag.name" [labelStyle]="tag.type"
            [style.zoom]="getZoom(tag.num.length)" (checkedChange)="changeChecked(tag)">
        </d-tag>
    </ng-container>

    <div class="list">
        <div *ngFor="let item of listArray" class="list-item">
            <d-card class="list-item" *ngIf="item.show===true">
                <d-card-header>
                    <d-card-title>
                        <a routerLink="/article/{{item.title}}" routerLinkActive="active">
                            {{item.title}}
                        </a>
                    </d-card-title>
                    <d-card-subtitle><i class="icon-company-member card-icon"></i><span>dashuai</span></d-card-subtitle>
                </d-card-header>
                <d-card-content>
                    {{item.tags}}
                </d-card-content>
                <d-card-actions [align]="'spaceBetween'">
                    <div class="action-text">更新于{{item.date}}</div>
                    <div>
                        <i class="icon-like card-icon"></i>
                        <i class="icon-more-operate card-icon"></i>
                    </div>
                </d-card-actions>
            </d-card>
        </div>
    </div>
</div>
